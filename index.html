    <style>

        .mode-btn {

        .theme-switch {
            --toggle-size: 4.5px; /* Mobile size */
            --container-width: 5.625em;
            --container-height: 2.5em;
            --container-radius: 6.25em;

            --stars-color: #fff;
            --clouds-color: #F3FDFF;
            --back-clouds-color: #AACADF;
            --transition: .5s cubic-bezier(0, -0.02, 0.4, 1.25);
            --circle-transition: .3s cubic-bezier(0, -0.02, 0.35, 1.17);

        @media (min-width: 641px) {
            .theme-switch {
                --toggle-size: 7px; /* Desktop size reduced */

             height: 2.1rem; /* 40px */
             padding: 0.5rem; /* 8px */

             #chitrakar-ui .custom-select-options .custom-select-option {
             padding: 0.6rem 0.75rem;
             font-size: 0.875rem; /* 14px */
            }
        }

        .theme-switch, .theme-switch *, .theme-switch *::before, .theme-switch *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-size: var(--toggle-size);
        }

        .theme-switch__container {
            width: var(--container-width);
            height: var(--container-height);
            background-color: var(--container-light-bg);
            border-radius: var(--container-radius);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0em -0.062em 0.062em rgba(0, 0, 0, 0.25), 0em 0.062em 0.125em rgba(255, 255, 255, 0.94);
            transition: var(--transition);
            position: relative;
        }

        .theme-switch__container::before {
            content: "";
            position: absolute;
            z-index: 1;
            inset: 0;
            box-shadow: 0em 0.05em 0.187em rgba(0, 0, 0, 0.25) inset, 0em 0.05em 0.187em rgba(0, 0, 0, 0.25) inset;
            border-radius: var(--container-radius)
        }

        .theme-switch__checkbox {
            display: none;
        }

        .theme-switch__circle-container {
            width: var(--circle-container-diameter);
            height: var(--circle-container-diameter);
            background-color: rgba(255, 255, 255, 0.1);
            position: absolute;
            left: var(--circle-container-offset);
            top: var(--circle-container-offset);
            border-radius: var(--container-radius);
            box-shadow: inset 0 0 0 3.375em rgba(255, 255, 255, 0.1), inset 0 0 0 3.375em rgba(255, 255, 255, 0.1), 0 0 0 0.625em rgba(255, 255, 255, 0.1), 0 0 0 1.25em rgba(255, 255, 255, 0.1);
            display: flex;
            transition: var(--circle-transition);
            pointer-events: none;
        }

        .theme-switch__sun-moon-container {
            pointer-events: auto;
            position: relative;
            z-index: 2;
            width: var(--sun-moon-diameter);
            height: var(--sun-moon-diameter);
            margin: auto;
            border-radius: var(--container-radius);
            background-color: var(--sun-bg);
            box-shadow: 0.062em 0.062em 0.062em 0em rgba(254, 255, 239, 0.61) inset, 0em -0.062em 0.062em 0em #a1872a inset;
            filter: drop-shadow(0.062em 0.125em 0.125em rgba(0, 0, 0, 0.25)) drop-shadow(0em 0.062em 0.125em rgba(0, 0, 0, 0.25));
            overflow: hidden;
            transition: var(--transition);
        }

        .theme-switch__moon {
            transform: translateX(100%);
            width: 100%;
            height: 100%;
            background-color: var(--moon-bg);
            border-radius: inherit;
            box-shadow: 0.062em 0.062em 0.062em 0em rgba(254, 255, 239, 0.61) inset, 0em -0.062em 0.062em 0em #969696 inset;
            transition: var(--transition);
            position: relative;
        }

        .theme-switch__spot {
            position: absolute;
            top: 0.75em;
            left: 0.312em;
            width: 0.75em;
            height: 0.75em;
            border-radius: var(--container-radius);
            background-color: var(--spot-color);
        }

        .theme-switch__spot:nth-of-type(2) {
            width: 0.375em;
            height: 0.375em;
            top: 0.937em;
            left: 1.375em;
        }

        .theme-switch__spot:nth-last-of-type(3) {
            width: 0.25em;
            height: 0.25em;
            top: 0.312em;
            left: 0.812em;
        }

        .theme-switch__clouds {
            width: 1.25em;
            height: 1.25em;
            background-color: var(--clouds-color);
            border-radius: var(--container-radius);
            position: absolute;
            bottom: -0.625em;
            left: 0.312em;
            box-shadow: 0.937em 0.312em var(--clouds-color), -0.312em -0.312em var(--back-clouds-color), 1.437em 0.375em var(--clouds-color), 0.5em -0.125em var(--back-clouds-color), 2.187em 0 var(--clouds-color), 1.25em -0.062em var(--back-clouds-color), 2.937em 0.312em var(--clouds-color), 2em -0.312em var(--back-clouds-color), 3.625em -0.062em var(--clouds-color), 2.625em 0em var(--back-clouds-color), 4.5em -0.312em var(--clouds-color), 3.375em -0.437em var(--back-clouds-color), 4.625em -1.75em 0 0.437em var(--clouds-color), 4em -0.625em var(--back-clouds-color), 4.125em -2.125em 0 0.437em var(--back-clouds-color);
            transition: 0.5s cubic-bezier(0, -0.02, 0.4, 1.25);
        }

        .theme-switch__stars-container {
            position: absolute;
            color: var(--stars-color);
            top: -100%;
            left: 0.312em;
            width: 2.75em;
            height: auto;
            transition: var(--transition);
        }

        .theme-switch__checkbox:checked+.theme-switch__container {
            background-color: var(--container-night-bg);
        }

        .theme-switch__checkbox:checked+.theme-switch__container .theme-switch__circle-container {
            left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter));
        }

        .theme-switch__checkbox:checked+.theme-switch__container .theme-switch__circle-container:hover {
            left: calc(100% - var(--circle-container-offset) - var(--circle-container-diameter) - 0.187em)
        }

        .theme-switch__circle-container:hover {
            left: calc(var(--circle-container-offset) + 0.187em);
        }

        .theme-switch__checkbox:checked+.theme-switch__container .theme-switch__moon {
            transform: translate(0);
        }

        .theme-switch__checkbox:checked+.theme-switch__container .theme-switch__clouds {
            bottom: -4.062em;
        }

        .theme-switch__checkbox:checked+.theme-switch__container .theme-switch__stars-container {
            top: 50%;
            transform: translateY(-50%);
        }

        .tooltip {
            position: relative;
            display: inline-block;
        }
        .tooltip .tooltiptext {
            visibility: hidden;
            white-space: nowrap;
            background-color: rgba(255, 255, 255, 0.7);

        .view-code-btn:hover {
            background-color: #4338ca;

        .source-card {

        }
        
        .message-content {
            text-align: left;

        }

            font-size: 0.875rem;
        }
        
        #network-status {
            padding: 0.25rem 0.75rem;

        }

            display: flex;

        }

            display: flex;

            }

            }
             #send-btn {
                width: 1.5rem; /* 24px */

            }
            #send-btn svg {
                width: 0.75rem;

            }
             #mic-btn {
                width: 1.75rem; /* 28px */

            }

            #chat-input:focus::-webkit-scrollbar-thumb,

            #chitrakar-ui .custom-select-button {

    <script>
        // START: Add this new code for mobile height fix
    function setViewportHeight() {
          let vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
          window.addEventListener('resize', setViewportHeight);
          window.addEventListener('load', setViewportHeight);
        
// END: Add this new code for mobile height fix
    // This script contains all the logic for the chat application.
    // It handles user input, API calls, theme switching, and UI updates.
    
    // Particle configurations for light and dark themes
    const particlesLight = {
        fpsLimit: 60,
        interactivity: { events: { onHover: { enable: true, mode: "connect" }, onClick: { enable: true, mode: "push" } } },
        particles: { 
            color: { value: "#000000" },

            number: { density: { enable: true, area: 800 }, value: 80 },

        },

    const particlesDark = {
        fpsLimit: 60,
        interactivity: { events: { onHover: { enable: true, mode: "connect" }, onClick: { enable: true, mode: "push" } } },
        particles: { 
            color: { value: "#ffffff" },
            links: { color: "#ffffff", distance: 150, enable: true, opacity: 0.2, width: 1 },
            move: { enable: true, speed: 1 }, 
            number: { density: { enable: true, area: 800 }, value: 80 }, 
            opacity: { value: 0.3 }, 
            size: { value: { min: 1, max: 3 } } 
        },
    };

    // Initialize particles on window load
    window.addEventListener('load', () => {
        tsParticles.load("tsparticles", particlesLight);
        updateNetworkStatus(); // Check network status on load
    });

    // DOM element references
    const chatArea = document.getElementById('chat-area');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const slashCommandSuggestion = document.getElementById('slash-command-suggestion');
    const searchSuggestionBtn = document.getElementById('search-suggestion-btn');
    const searchPillContainer = document.getElementById('search-pill-container');
    const micBtn = document.getElementById('mic-btn');
    const sendBtn = document.getElementById('send-btn');
    const sendIcon = document.getElementById('send-icon');
    const stopIcon = document.getElementById('stop-icon');
    const sendTooltipText = document.getElementById('send-tooltip-text');
    const chitrakarUI = document.getElementById('chitrakar-ui');
    const themeSwitch = document.querySelector('.theme-switch__checkbox');
    const body = document.body;
    const chatboxContainer = document.getElementById('chatbox-container');
    const chitrakarSettingsBtn = document.getElementById('chitrakar-settings-btn');
    const chitrakarSettingsContainer = document.getElementById('chitrakar-settings-container');
    const imageModal = document.getElementById('image-modal');
    const modalImage = document.getElementById('modal-image');
    const modalCloseBtn = document.getElementById('modal-close-btn');
    const imageModalBackdrop = document.getElementById('image-modal-backdrop');
    const codeModal = document.getElementById('code-modal');
    const modalCodeContent = document.getElementById('modal-code-content');
    const codeModalCopyBtn = document.getElementById('code-modal-copy-btn');
    const codeModalCloseBtn = document.getElementById('code-modal-close-btn');
    const codeModalBackdrop = document.getElementById('code-modal-backdrop');
    const networkStatus = document.getElementById('network-status');

    const modeButtons = {
        guffgaff: document.getElementById('mode-guffgaff'),
        chitrakar: document.getElementById('mode-chitrakar'),
        khoj: document.getElementById('mode-khoj'),
        gyani: document.getElementById('mode-gyani'),
    };

    // State variables
    const serperApiKey = 'f0510322e97936da3e5ea6a12386c5340277abfc';
    let activeMode = 'general';
    let isGenerating = false;
    let isRecognizing = false;
    let abortController = new AbortController();
    let chatHistory = []; 
    let isSearchActive = false;

    // Speech Recognition setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.onstart = () => {
            isRecognizing = true;
            micBtn.classList.add('mic-listening');
        };
        recognition.onend = () => {
            isRecognizing = false;
            micBtn.classList.remove('mic-listening');
        };
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            chatInput.value = chatInput.value ? chatInput.value + ' ' + transcript : transcript;
            chatInput.dispatchEvent(new Event('input', { bubbles: true }));
        };
        recognition.onerror = (event) => {
            isRecognizing = false;
            micBtn.classList.remove('mic-listening');
            console.error("Speech recognition error:", event.error);
            if (event.error === 'no-speech') {
                addMessage('shreyo', '<span class="italic">I didn\'t hear anything. Please try again.</span>', true);
            } else if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
                addMessage('shreyo', '<span class="italic">Microphone permission was denied. Please allow it in your browser settings to use voice input.</span>', true);
            }
        };
    } else {
        micBtn.style.display = 'none';
    }

    // Manages the UI state when generating a response
    function setGeneratingState(generating) {
        isGenerating = generating;
        chatInput.disabled = generating;
        micBtn.disabled = generating;
        Object.values(modeButtons).forEach(btn => btn.disabled = generating);

        sendIcon.classList.toggle('hidden', generating);
        stopIcon.classList.toggle('hidden', !generating);

        sendTooltipText.textContent = generating ? 'Please Wait' : 'Send';
    }


// Switches the active mode of the chatbot
    function switchMode(newMode, event) {
        if (event) event.preventDefault(); // Prevent default touch behaviors
        
        const wasChitrakar = activeMode === 'chitrakar';
        const isSameMode = activeMode === newMode;

    // Main function to handle the generation process
    async function startGeneration() {
        if (isGenerating) return;
        
        let userInput = chatInput.value.trim();
        let fullInput = userInput;

        if (isSearchActive) {
            fullInput = `/search ${userInput}`;
        }
        
        if (!userInput && !isSearchActive) return;
        
        addMessage('user', fullInput);
        chatInput.value = '';
        autoResizeTextarea(); // Reset textarea size
        
        if (!isSearchActive) {
            chatHistory.push({ role: "user", parts: [{ text: fullInput }] });
        }
        
        setGeneratingState(true);
        abortController = new AbortController();

        const thinkingMessageContainer = addMessage('shreyo', '<span class="italic">Shreyo is thinking...</span>', true);
        
        try {
            if (isSearchActive) {
                await performSearchAndGenerate(userInput || 'latest news', thinkingMessageContainer);
            } else if (activeMode === 'chitrakar') {
                await generateImage(userInput, thinkingMessageContainer);
            } else {
                await generateText(userInput, thinkingMessageContainer);
            }
        } catch (error) {
            if (error.name === 'AbortError') {
                thinkingMessageContainer.innerHTML = '<span class="italic text-slate-800">Response generation was cancelled.</span>';
            } else {
               console.error("An unexpected error occurred:", error);
               thinkingMessageContainer.innerHTML = 'Oops! Something went wrong. Please try again later.';
            }
        } finally {
            setGeneratingState(false);
            if (activeMode === 'general') {
                isSearchActive = false;
                updateSearchPill();
                chatInput.placeholder = 'Start a conversation... type / for search'; // <-- ADD THIS LINE
            }
        }
    }

    // Perform web search using Serper.dev
    async function performWebSearch(query) {
        const response = await fetch('https://google.serper.dev/search', {
            method: 'POST',
            headers: { 'X-API-KEY': serperApiKey, 'Content-Type': 'application/json' },
            body: JSON.stringify({ q: query }),
            signal: abortController.signal
        });
        if (!response.ok) throw new Error(`Serper API Error: ${response.statusText}`);
        const data = await response.json();
        return data.organic || [];
    }

async function performSearchAndGenerate(query, messageContainer) {
    try {
        messageContainer.innerHTML = '<span class="italic">Searching the web...</span>';
        const searchResults = await performWebSearch(query);

        if (searchResults.length === 0) {
            messageContainer.innerHTML = "I couldn't find relevant info. Answering from memory.";
            await generateText(query, messageContainer);
            return;
        }

        const formattedResults = searchResults.slice(0, 5).map(r => `Snippet: ${r.snippet}\nSource: ${r.link}`).join('\n\n');
        const finalPrompt = `Based on these search results, answer: "${query}"\n\nData:\n${formattedResults}`;

        // --- FIX: Save the Search Context to Memory ---
        chatHistory.push({ 
            role: "user", 
            parts: [{ text: `System Context: User searched for "${query}".\nResults: ${formattedResults}\n\nUser Question: ${query}` }] 
        });

        // We pass 'true' so generateText knows we just updated the history manually
        await generateText(finalPrompt, messageContainer, true);

    } catch (error) {
        console.error("Search failed:", error);
        messageContainer.innerHTML = 'Search unavailable. Trying normal chat...';
        await generateText(query, messageContainer);
    }
}

    function getCleanDomain(url) {
        try {
            const urlObj = new URL(url);
            let hostname = urlObj.hostname.replace(/^www\./, '');
            return hostname;
        } catch (e) {
            return url;
        }

// FIX: Robust Memory Handling for Chat & Search
    async function generateText(prompt, messageContainer, isAugmented = false) {
        let contents;
        const systemInstruction = constructPrompt(prompt);

        // --- MEMORY LOGIC ---
        if (isAugmented) {
            // SEARCH MODE: The 'prompt' here is the Rich Context (Query + Search Results).
            // We must manually save this to history now, because startGeneration didn't do it.
            // This ensures Shreyo remembers the search results for the next turn.
            chatHistory.push({ role: "user", parts: [{ text: prompt }] });
        } 
        // NORMAL MODE: startGeneration has ALREADY pushed the user's raw message to history.

        // --- PAYLOAD CONSTRUCTION ---
        // We take the entire history, remove the very last item (which is the raw User Message we just added),
        // and replace it with a version that has the System Instructions attached to the front.
        // This tricks the AI into following rules without cluttering the history array with duplicate system prompts.
        contents = [ 
            ...chatHistory.slice(0, -1), 
            { role: "user", parts: [{ text: `${systemInstruction}\n\n${prompt}` }] } 
        ];

        const payload = { contents };
        const url = '/api/ai'; 
        
        try {
            const response = await fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(payload), 
                signal: abortController.signal 
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                console.error("Backend Error:", errData);
                throw new Error(errData.message || 'Server connection failed');
            }
            
            const result = await response.json();

            if (result.candidates?.[0]?.content?.parts?.[0]) {
                let text = result.candidates[0].content.parts[0].text;
                
                // Save AI response to history so context is preserved
                chatHistory.push({ role: "model", parts: [{ text: text }] }); 
                
                let html = DOMPurify.sanitize(marked.parse(text), { ADD_ATTR: ['target'] });
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Link Cards Logic
                doc.querySelectorAll('a').forEach(a => {
                    const href = a.getAttribute('href');
                    if (href) {
                        const cleanDomain = getCleanDomain(href);
                        const faviconUrl = `https://www.google.com/s2/favicons?domain=${cleanDomain}&sz=16`;
                        const card = document.createElement('a');
                        card.href = href; card.target = '_blank'; card.rel = 'noopener noreferrer'; card.className = 'source-card';
                        card.innerHTML = `<img src="${faviconUrl}" alt=""><span>${cleanDomain}</span>`;
                        a.replaceWith(card);
                    }
                });
                
                messageContainer.innerHTML = doc.body.innerHTML;
                
                // Code Block Buttons
                const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
                if (text.match(codeBlockRegex)) {
                     messageContainer.innerHTML = text.split(codeBlockRegex).reduce((acc, part, index) => {
                        if (index % 3 === 0) return acc + DOMPurify.sanitize(marked.parse(part));
                        if (index % 3 === 1) return acc;
                        const code = part;
                        const lang = text.split(codeBlockRegex)[index-1] || 'plaintext';
                        return acc + `<div class="code-block-container" data-code="${encodeURIComponent(code)}" data-lang="${lang}"><button class="view-code-btn" onclick="viewCode(this)">View Generated Code</button></div>`;
                    }, '');
                } else {
                     messageContainer.innerHTML = doc.body.innerHTML;
                }

            } else {
                throw new Error('No content.');
            }
        } catch (e) {
            console.error(e);
            messageContainer.innerHTML = '<span class="text-red-500">Connection error. Please try again.</span>';
        }
    }
    window.viewCode = function(button) {
        const container = button.parentElement;
        const code = decodeURIComponent(container.dataset.code);
        const lang = container.dataset.lang;
        openCodeModal(code, lang);
    }

    async function downloadImage(imageUrl) {
        try {
            const response = await fetch(`/api/download-image?url=${encodeURIComponent(imageUrl)}`);
            if (!response.ok) throw new Error(`Server error: ${response.statusText}`);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'shreyo-creation.png';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            a.remove();
        } catch (error) {
            console.error('Download failed:', error);
            addMessage('shreyo', '<span class="italic">Sorry, the image could not be downloaded.</span>', true);
        }
    }

            updateSearchPill();
            chatInput.focus();
        } else if (e.key === 'Backspace' && chatInput.value === '' && isSearchActive && activeMode !== 'khoj') {
             isSearchActive = false;
             updateSearchPill();
             chatInput.placeholder = 'Start a conversation... type / for search';
        }
    });

    searchSuggestionBtn.addEventListener('click', () => {
        isSearchActive = true;
        chatInput.value = '';
        chatInput.placeholder = 'Searching the web...';
        slashCommandSuggestion.classList.add('hidden');
        updateSearchPill();
        chatInput.focus();
    });

    // Initial UI setup
    switchMode('general');

    </script>
</body>
</html>
